<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fan Quiz | Real Madrid CF</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  .quiz-wrap { max-width: 700px; margin: 0 auto; padding: 120px 24px 100px; }
  .quiz-heading { font-family: 'Cinzel', serif; font-size: 2.4rem; font-weight: 900; color: #fff; text-align: center; margin-bottom: 8px; }
  .quiz-sub { font-family: 'Raleway', sans-serif; color: #aaa; text-align: center; margin-bottom: 40px; }

  .quiz-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 32px; }
  .quiz-progress { font-family: 'Raleway', sans-serif; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: rgb(252,3,98); margin-bottom: 12px; }
  .quiz-question { font-family: 'Cinzel', serif; font-size: 1.3rem; color: #fff; margin-bottom: 24px; line-height: 1.5; }
  .quiz-options { display: flex; flex-direction: column; gap: 12px; }
  .quiz-option {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
    padding: 14px 18px; font-family: 'Raleway', sans-serif; color: #eee; cursor: pointer; transition: all 0.2s ease; text-align: left;
  }
  .quiz-option:hover { border-color: rgb(252,3,98); background: rgba(252,3,98,0.08); }
  .quiz-option.selected { border-color: rgb(252,3,98); background: rgba(252,3,98,0.18); }
  .quiz-nav { display: flex; justify-content: space-between; margin-top: 28px; }
  .quiz-btn {
    background: rgb(252,3,98); color: #fff; border: none; border-radius: 30px; padding: 12px 28px;
    font-family: 'Raleway', sans-serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    font-size: 0.8rem; cursor: pointer; transition: background 0.2s ease;
  }
  .quiz-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .quiz-btn:hover:not(:disabled) { background: #c9024f; }
  .quiz-btn.secondary { background: transparent; border: 1px solid rgba(255,255,255,0.2); }

  .quiz-result { text-align: center; }
  .quiz-score { font-family: 'Cinzel', serif; font-size: 3.5rem; font-weight: 900; color: rgb(252,3,98); }
  .quiz-score-label { font-family: 'Raleway', sans-serif; color: #aaa; margin-bottom: 24px; }
  .quiz-name-input { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
  .quiz-name-input input {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
    padding: 12px 14px; color: #fff; font-family: 'Raleway', sans-serif; min-width: 200px;
  }

  .leaderboard-section { max-width: 700px; margin: 60px auto 0; }
  .leaderboard-heading { font-family: 'Cinzel', serif; font-size: 1.6rem; color: #fff; text-align: center; margin-bottom: 20px; }
  .leaderboard-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 12px 18px; margin-bottom: 8px; font-family: 'Raleway', sans-serif;
  }
  .leaderboard-row .rank { color: rgb(252,3,98); font-family: 'Cinzel', serif; font-weight: 900; width: 30px; }
  .leaderboard-row .lb-name { color: #fff; flex: 1; }
  .leaderboard-row .lb-score { color: #ccc; font-weight: 700; }
</style>
</head>
<body>
<header class="top-header">
    <div class="top-border-line"></div>
    <div class="header-inner">
        <a href="index.html" class="header-logo">
            <img src="assets/rmlogo.png" alt="Real Madrid Logo" class="rm-logo">
        </a>
        <nav class="header-nav">
            <a href="index.html">Home</a>
            <a href="index.html#squad">Squad</a>
            <a href="quiz.html">Quiz</a>
        </nav>
        <div class="header-right">
            <a href="index.html" class="nav-merch">Back to Site</a>
        </div>
    </div>
</header>

<div class="quiz-wrap">
  <h1 class="quiz-heading">Ultimate Fan Quiz</h1>
  <p class="quiz-sub">How well do you really know Real Madrid?</p>

  <div id="quizArea"></div>
</div>

<div class="leaderboard-section">
  <h2 class="leaderboard-heading">🏆 Leaderboard — Top 10</h2>
  <div id="leaderboardArea"></div>
</div>

<script>
  let questions = [];
  let currentIndex = 0;
  let answers = {}; // { questionId: selectedOptionIndex }

  const quizArea = document.getElementById('quizArea');
  const leaderboardArea = document.getElementById('leaderboardArea');

  async function loadQuiz() {
    quizArea.innerHTML = '<p style="text-align:center; color:#aaa;">Loading questions...</p>';
    try {
      const res = await fetch('/api/quiz');
      questions = await res.json();
      currentIndex = 0;
      answers = {};
      renderQuestion();
    } catch (err) {
      quizArea.innerHTML = '<p style="text-align:center; color:#f87171;">Could not load the quiz. Is the backend server running?</p>';
    }
  }

  function renderQuestion() {
    const q = questions[currentIndex];
    const selected = answers[q.id];

    quizArea.innerHTML = `
      <div class="quiz-card">
        <p class="quiz-progress">Question ${currentIndex + 1} of ${questions.length}</p>
        <h3 class="quiz-question">${q.question}</h3>
        <div class="quiz-options">
          ${q.options.map((opt, i) => `
            <button type="button" class="quiz-option ${selected === i ? 'selected' : ''}" data-index="${i}">${opt}</button>
          `).join('')}
        </div>
        <div class="quiz-nav">
          <button class="quiz-btn secondary" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>Previous</button>
          <button class="quiz-btn" id="nextBtn" ${selected === undefined ? 'disabled' : ''}>
            ${currentIndex === questions.length - 1 ? 'Submit' : 'Next'}
          </button>
        </div>
      </div>
    `;

    quizArea.querySelectorAll('.quiz-option').forEach(btn => {
      btn.addEventListener('click', () => {
        answers[q.id] = Number(btn.dataset.index);
        renderQuestion();
      });
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      currentIndex = Math.max(0, currentIndex - 1);
      renderQuestion();
    });

    document.getElementById('nextBtn').addEventListener('click', async () => {
      if (currentIndex < questions.length - 1) {
        currentIndex++;
        renderQuestion();
      } else {
        await submitQuiz();
      }
    });
  }

  async function submitQuiz() {
    quizArea.innerHTML = '<p style="text-align:center; color:#aaa;">Grading your answers...</p>';
    try {
      const res = await fetch('/api/quiz/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answers })
      });
      const result = await res.json();
      renderResult(result.score, result.total);
    } catch (err) {
      quizArea.innerHTML = '<p style="text-align:center; color:#f87171;">Something went wrong grading the quiz.</p>';
    }
  }

  function renderResult(score, total) {
    quizArea.innerHTML = `
      <div class="quiz-card quiz-result">
        <p class="quiz-score">${score}/${total}</p>
        <p class="quiz-score-label">correct answers</p>
        <p style="font-family:'Raleway',sans-serif; color:#ccc;">Enter your name to save your score to the leaderboard.</p>
        <div class="quiz-name-input">
          <input type="text" id="usernameInput" placeholder="Your name" maxlength="30">
          <button class="quiz-btn" id="saveScoreBtn">Save Score</button>
        </div>
        <div style="margin-top:20px;">
          <button class="quiz-btn secondary" id="retryBtn">Try Again</button>
        </div>
      </div>
    `;

    document.getElementById('saveScoreBtn').addEventListener('click', async () => {
      const username = document.getElementById('usernameInput').value.trim();
      if (!username) return;
      await fetch('/api/leaderboard', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, score })
      });
      loadLeaderboard();
      document.getElementById('saveScoreBtn').textContent = 'Saved ✓';
      document.getElementById('saveScoreBtn').disabled = true;
    });

    document.getElementById('retryBtn').addEventListener('click', loadQuiz);
  }

  async function loadLeaderboard() {
    try {
      const res = await fetch('/api/leaderboard');
      const leaderboard = await res.json();
      if (!leaderboard.length) {
        leaderboardArea.innerHTML = '<p style="text-align:center; color:#888; font-family:Raleway,sans-serif;">No scores yet. Be the first Madridista on the board!</p>';
        return;
      }
      leaderboardArea.innerHTML = leaderboard.map((entry, i) => `
        <div class="leaderboard-row">
          <span class="rank">#${i + 1}</span>
          <span class="lb-name">${entry.username}</span>
          <span class="lb-score">${entry.score} pts</span>
        </div>
      `).join('');
    } catch (err) {
      leaderboardArea.innerHTML = '<p style="text-align:center; color:#f87171;">Could not load leaderboard.</p>';
    }
  }

  loadQuiz();
  loadLeaderboard();
</script>
</body>
</html>
