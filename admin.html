<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Manage Squad — Real Madrid CF</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  .admin-wrap { max-width: 640px; margin: 0 auto; padding: 120px 24px 100px; }
  .admin-heading { font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 900; color: #fff; margin-bottom: 8px; text-align: center; }
  .admin-sub { font-family: 'Raleway', sans-serif; color: #aaa; text-align: center; margin-bottom: 40px; }
  .admin-form { display: flex; flex-direction: column; gap: 18px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 32px; }
  .admin-field { display: flex; flex-direction: column; gap: 6px; }
  .admin-field label { font-family: 'Raleway', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgb(252,3,98); }
  .admin-field input, .admin-field select, .admin-field textarea {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
    padding: 12px 14px; color: #fff; font-family: 'Raleway', sans-serif; font-size: 0.9rem;
  }
  .admin-field textarea { resize: vertical; min-height: 70px; }
  .admin-row { display: flex; gap: 14px; }
  .admin-row .admin-field { flex: 1; }
  .admin-submit {
    margin-top: 8px; background: rgb(252,3,98); color: #fff; border: none; border-radius: 30px;
    padding: 14px; font-family: 'Raleway', sans-serif; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; font-size: 0.85rem; cursor: pointer; transition: background 0.2s ease;
  }
  .admin-submit:hover { background: #c9024f; }
  .admin-status { text-align: center; margin-top: 16px; font-family: 'Raleway', sans-serif; font-size: 0.85rem; min-height: 20px; }
  .admin-status.success { color: #4ade80; }
  .admin-status.error { color: #f87171; }
  .admin-list { margin-top: 60px; }
  .admin-list h3 { font-family: 'Cinzel', serif; color: #fff; margin-bottom: 16px; }
  .admin-player-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; font-family: 'Raleway', sans-serif; font-size: 0.85rem; color: #ccc;
  }
  .admin-player-row .name { color: #fff; font-weight: 600; }
  .admin-back { display: block; text-align: center; margin-top: 24px; color: rgb(252,3,98); font-family: 'Raleway', sans-serif; font-size: 0.85rem; text-decoration: none; }
</style>
</head>
<body>
<header class="top-header">
    <div class="top-border-line"></div>
    <div class="header-inner">
        <a href="index.html" class="header-logo">
            <img src="assets/rmlogo.png" alt="Real Madrid Logo" class="rm-logo">
        </a>
        <nav class="header-nav">
            <a href="index.html">Home</a>
            <a href="index.html#squad">Squad</a>
            <a href="quiz.html">Quiz</a>
        </nav>
        <div class="header-right">
            <a href="index.html" class="nav-merch">Back to Site</a>
        </div>
    </div>
</header>

<div class="admin-wrap">
  <h1 class="admin-heading">Squad Admin</h1>
  <p class="admin-sub">Add a new player straight into the live squad data.</p>

  <form class="admin-form" id="playerForm">
    <div class="admin-field">
      <label for="name">Player Name *</label>
      <input type="text" id="name" name="name" placeholder="e.g. Franco Mastantuono" required>
    </div>

    <div class="admin-row">
      <div class="admin-field">
        <label for="role">Role *</label>
        <input type="text" id="role" name="role" placeholder="e.g. Centre Forward" required>
      </div>
      <div class="admin-field">
        <label for="position">Position Group *</label>
        <select id="position" name="position" required>
          <option value="Goalkeeper">Goalkeeper</option>
          <option value="Defender">Defender</option>
          <option value="Midfielder">Midfielder</option>
          <option value="Attacker">Attacker</option>
        </select>
      </div>
    </div>

    <div class="admin-row">
      <div class="admin-field">
        <label for="number">Jersey Number *</label>
        <input type="number" id="number" name="number" min="1" max="99" placeholder="e.g. 9" required>
      </div>
      <div class="admin-field">
        <label for="nation">Nation</label>
        <input type="text" id="nation" name="nation" placeholder="e.g. Spain">
      </div>
    </div>

    <div class="admin-field">
      <label for="image">Image URL / Path *</label>
      <input type="text" id="image" name="image" placeholder="e.g. assets/newplayer.png" required>
    </div>

    <div class="admin-field">
      <label for="bio">Short Bio</label>
      <textarea id="bio" name="bio" placeholder="A sentence or two about the player..."></textarea>
    </div>

    <button type="submit" class="admin-submit">Add Player</button>
    <p class="admin-status" id="statusMsg"></p>
  </form>

  <div class="admin-list">
    <h3>Current Squad (<span id="playerCount">0</span>)</h3>
    <div id="playerListContainer"></div>
  </div>
</div>

<script>
  const API_BASE = '/api/players';
  const form = document.getElementById('playerForm');
  const statusMsg = document.getElementById('statusMsg');
  const playerListContainer = document.getElementById('playerListContainer');
  const playerCount = document.getElementById('playerCount');

  async function loadPlayers() {
    try {
      const res = await fetch(API_BASE);
      const players = await res.json();
      playerCount.textContent = players.length;
      playerListContainer.innerHTML = players.map(p => `
        <div class="admin-player-row">
          <span class="name">#${p.number} — ${p.name}</span>
          <span>${p.position} · ${p.nation || 'N/A'}</span>
        </div>
      `).join('');
    } catch (err) {
      playerListContainer.innerHTML = '<p style="color:#f87171;">Could not load players. Is the backend server running?</p>';
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    statusMsg.textContent = '';
    statusMsg.className = 'admin-status';

    const formData = new FormData(form);
    const payload = {
      name: formData.get('name'),
      role: formData.get('role'),
      position: formData.get('position'),
      number: Number(formData.get('number')),
      nation: formData.get('nation'),
      image: formData.get('image'),
      bio: formData.get('bio'),
      stats: {} 
    };

    try {
      const res = await fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Failed to add player.');
      }

      statusMsg.textContent = `✓ ${payload.name} added to the squad!`;
      statusMsg.classList.add('success');
      form.reset();
      loadPlayers();
    } catch (err) {
      statusMsg.textContent = `✗ ${err.message}`;
      statusMsg.classList.add('error');
    }
  });

  loadPlayers();
</script>
</body>
</html>
